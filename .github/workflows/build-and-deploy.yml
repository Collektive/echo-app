name: CI/CD Process
on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    concurrency:
      group: ios-${{ github.workflow }}-${{ github.event.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
        with:
          allow-snapshots: false
          min-wrapper-count: 1
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Set up Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build iOS via Fastlane
        run: bundle exec fastlane ios build

  build-android:
    name: Compile Android
    runs-on: ubuntu-latest
    concurrency:
      group: android-${{ github.workflow }}-${{ github.event.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
        with:
          allow-snapshots: false
          min-wrapper-count: 1
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Set up Ruby w/Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run lint through Fastlane
        run: bundle exec fastlane android lint
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_STRING | base64 -di > composeApp/keystore.jks
      - name: Build Android Release (APK & AAB) via Fastlane
        run: bundle exec fastlane android release
        env: # for gradle
          KEYSTORE_FILE: "keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: echo-app-apk
          path: composeApp/build/outputs/apk/release/*.apk
      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: echo-app-aab
          path: composeApp/build/outputs/bundle/release/*.aab

  release:
    runs-on: ubuntu-latest
    needs:
      - build-ios
      - build-android
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: release-${{ github.event.number || github.ref }}
    if: >
      github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.DEPLOYMENT_TOKEN }}
      - name: Download Android APK artifact
        uses: actions/download-artifact@v8
        with:
          name: echo-app-apk
          path: composeApp/build/outputs/apk/release/
      - name: Find the version of Node from package.json
        id: node-version
        run: echo "version=$(jq -r .engines.node package.json)" >> $GITHUB_OUTPUT
      - name: Install Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ steps.node-version.outputs.version }}
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOYMENT_TOKEN }}
        run: |
          npm install
          npx semantic-release

  deploy-play-store:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    needs:
      - build-android
      - release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download Android AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: echo-app-aab
          path: composeApp/build/outputs/bundle/release/
      - name: Set up Ruby & Fastlane for Play Store Deploy
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Prepare Play Store credentials
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          bundle exec ruby -rbase64 -rjson -e '
            raw = ENV.fetch("PLAY_STORE_JSON_KEY", "").strip
            abort("PLAY_STORE_JSON_KEY is empty") if raw.empty?

            candidates = [raw]
            begin
              decoded = Base64.strict_decode64(raw).strip
              candidates << decoded unless decoded.empty?
            rescue ArgumentError
              nil
            end

            json = candidates.lazy.map do |candidate|
              begin
                parsed = JSON.parse(candidate)
                if parsed.is_a?(String)
                  nested = JSON.parse(parsed)
                  [parsed, nested]
                else
                  [candidate, parsed]
                end
              rescue JSON::ParserError
                nil
              end
            end.find do |entry|
              next false unless entry

              parsed = entry[1]
              parsed.is_a?(Hash) &&
                parsed["type"] == "service_account" &&
                !parsed["client_email"].to_s.empty? &&
                !parsed["private_key"].to_s.empty?
            end&.first

            abort("PLAY_STORE_JSON_KEY must contain raw service account JSON or its base64-encoded contents") unless json
            File.write("play-store-key.json", json + "\n")
          '
      - name: Deploy to Google Play Store via Fastlane
        env:
          PLAY_STORE_JSON_KEY_PATH: ${{ github.workspace }}/play-store-key.json
        run: bundle exec fastlane android deploy track:internal # default to internal deploy, change this when needed

  success:
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-ios
      - release
      - deploy-play-store
    if: >-
      always() && (
        contains(join(needs.*.result, ','), 'failure')
        || !contains(join(needs.*.result, ','), 'cancelled')
      )
    steps:
      - name: Verify that there were no failures
        run: ${{ !contains(join(needs.*.result, ','), 'failure') }}

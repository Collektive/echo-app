name: CI/CD Process
on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    concurrency:
      group: ios-${{ github.workflow }}-${{ github.event.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
        with:
          allow-snapshots: false
          min-wrapper-count: 1
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Set up Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build iOS via Fastlane
        run: bundle exec fastlane ios build

  build-android:
    name: Compile Android
    runs-on: ubuntu-latest
    concurrency:
      group: android-${{ github.workflow }}-${{ github.event.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
        with:
          allow-snapshots: false
          min-wrapper-count: 1
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Set up Ruby w/Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run lint through Fastlane
        run: bundle exec fastlane android lint
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_STRING | base64 -di > composeApp/keystore.jks
      - name: Build Android Release (APK & AAB) via Fastlane
        run: bundle exec fastlane android release
        env: # for gradle
          KEYSTORE_FILE: "keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-app-apk
          path: composeApp/build/outputs/apk/release/*.apk
      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-app-aab
          path: composeApp/build/outputs/bundle/release/*.aab

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-ios
      - build-android
    concurrency:
      # Only one release job at a time per branch, as only master releases.
      group: release-${{ github.event.number || github.ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: composeApp/build/outputs/apk/release/
      - name: Install Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ steps.node-version.outputs.version }}
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOYMENT_TOKEN }}
        run: |
          npm install
          npx semantic-release

